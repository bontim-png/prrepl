name: 🏠 Vastgoed Scraper

on:
  schedule:
    - cron: '0 7 * * *'   # Elke dag om 07:00 UTC (09:00 NL zomertijd)
  workflow_dispatch:        # Ook handmatig te starten via GitHub UI

permissions:
  contents: write
  
jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Dependencies installeren
        run: | python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt

      - name: 🎭 Playwright browsers installeren
        run: |
          # --with-deps faalt op Ubuntu 24 vanwege hernoemde packages
          # We installeren de dependencies handmatig met de juiste namen
          sudo apt-get update -qq
          sudo apt-get install -y \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 \
            libpangocairo-1.0-0 libgtk-3-0 libglib2.0-0 libnss3 libnspr4
          playwright install chromium

      - name: 🕷️ Scraper draaien
        run: python script.py

      - name: 💾 Data opslaan als artifact
        uses: actions/upload-artifact@v4
        with:
          name: vastgoed-data-${{ github.run_number }}
          path: data.json
          retention-days: 30

      - name: 📝 data.json committen naar repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "🏠 Vastgoed update $(date +'%Y-%m-%d %H:%M')"
          git push
