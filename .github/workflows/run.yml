name: 🏠 Vastgoed Scraper

on:
  schedule:
    - cron: '0 7 * * *'   # Elke dag om 07:00 UTC (09:00 NL zomertijd)
  workflow_dispatch:        # Ook handmatig te starten via GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Dependencies installeren
        run: pip install -r requirements.txt

      - name: 🎭 Playwright browsers installeren
        run: playwright install chromium --with-deps

      - name: 🕷️ Scraper draaien
        run: python scraper.py

      - name: 💾 Data opslaan als artifact
        uses: actions/upload-artifact@v4
        with:
          name: vastgoed-data-${{ github.run_number }}
          path: data.json
          retention-days: 30

      - name: 📝 data.json committen naar repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "🏠 Vastgoed update $(date +'%Y-%m-%d %H:%M')"
          git push
